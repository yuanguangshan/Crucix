              .attr("stroke", "rgba(255,120,80,0.7)")
              .attr("stroke-width", 1.5);
            g.append("circle")
              .attr("r", r * 0.4)
              .attr("fill", "rgba(255,120,80,0.3)");
          });
        // Flight corridors
        const airCoordsFlight = [
          { lat: 30, lon: 44 },
          { lat: 24, lon: 120 },
          { lat: 49, lon: 32 },
          { lat: 57, lon: 24 },
          { lat: 14, lon: 114 },
          { lat: 37, lon: 127 },
        ];
        const hubs = [
          { lat: 40.6, lon: -73.8 },
          { lat: 51.5, lon: -0.5 },
          { lat: 25.3, lon: 55.4 },
          { lat: 1.4, lon: 103.8 },
          { lat: -33.9, lon: 151.2 },
          { lat: -23.4, lon: -46.5 },
        ];
        const cG = flatG.append("g").attr("class", "corridors-layer");
        for (let i = 0; i < D.air.length; i++) {
          for (let j = i + 1; j < D.air.length; j++) {
            const a = D.air[i],
              b = D.air[j],
              from = airCoordsFlight[i],
              to = airCoordsFlight[j];
            if (!from || !to) continue;
            const traffic = a.total + b.total;
            if (traffic < 30) continue;
            const ncR = (a.noCallsign + b.noCallsign) / Math.max(traffic, 1);
            const clr =
              ncR > 0.15
                ? "rgba(255,95,99,0.4)"
                : ncR > 0.05
                  ? "rgba(255,184,76,0.35)"
                  : "rgba(100,240,200,0.25)";
            const interp = d3.geoInterpolate(
              [from.lon, from.lat],
              [to.lon, to.lat],
            );
            const coords = [];
            for (let k = 0; k <= 40; k++) coords.push(interp(k / 40));
            const feat = {
              type: "Feature",
              geometry: { type: "LineString", coordinates: coords },
            };
            cG.append("path")
              .datum(feat)
              .attr("d", flatPath)
              .attr("fill", "none")
              .attr("stroke", clr)
              .attr("stroke-width", Math.max(0.8, Math.min(3, traffic / 80)));
          }
        }
        D.air.forEach((a, i) => {
          if (!airCoordsFlight[i] || a.total < 25) return;
          hubs.forEach((hub) => {
            if (
              Math.abs(airCoordsFlight[i].lat - hub.lat) +
                Math.abs(airCoordsFlight[i].lon - hub.lon) <
              20
            )
              return;
            const interp = d3.geoInterpolate(
              [airCoordsFlight[i].lon, airCoordsFlight[i].lat],
              [hub.lon, hub.lat],
            );
            const coords = [];
            for (let k = 0; k <= 40; k++) coords.push(interp(k / 40));
            cG.append("path")
              .datum({
                type: "Feature",
                geometry: { type: "LineString", coordinates: coords },
              })
              .attr("d", flatPath)
              .attr("fill", "none")
              .attr("stroke", "rgba(100,240,200,0.15)")
              .attr("stroke-width", 0.6);
          });
        });
      }

      // Update setRegion for flat mode
      const _origSetRegion = setRegion;

      // Override mapZoom for flat mode
      const _origMapZoom = mapZoom;

      function setRegion(r) {
        document
          .querySelectorAll(".region-btn")
          .forEach((b) => b.classList.toggle("active", b.dataset.region === r));
        closePopup();
        if (isFlat && flatSvg && flatZoom) {
          if (r === "world") {
            flatSvg
              .transition()
              .duration(750)
              .call(flatZoom.transform, d3.zoomIdentity);
            return;
          }
          const bounds = flatRegionBounds[r];
          const p0 = flatProjection(bounds[0]),
            p1 = flatProjection(bounds[1]);
          if (!p0 || !p1) return;
          const dx = Math.abs(p1[0] - p0[0]),
            dy = Math.abs(p1[1] - p0[1]);
          const cx = (p0[0] + p1[0]) / 2,
            cy = (p0[1] + p1[1]) / 2;
          const scale = Math.min(flatW / dx, flatH / dy) * 0.85;
          flatSvg
            .transition()
            .duration(750)
            .call(
              flatZoom.transform,
              d3.zoomIdentity
                .translate(flatW / 2 - scale * cx, flatH / 2 - scale * cy)
                .scale(scale),
            );
        } else {
          const pov = regionPOV[r] || regionPOV.world;
          globe.pointOfView(pov, 1000);
        }
      }

      function mapZoom(factor) {
        if (isFlat && flatSvg && flatZoom) {
          flatSvg.transition().duration(300).call(flatZoom.scaleBy, factor);
        } else if (globe) {
          const pov = globe.pointOfView();
          globe.pointOfView({ altitude: pov.altitude / factor }, 300);
        }
      }

      // Sparkline SVG generator
      function mkSparkSvg(values, isGood) {
        if (!values || values.length < 2) return "";
        const w = 52,
          h = 18,
          pad = 2;
        const min = Math.min(...values),
          max = Math.max(...values);
        const range = max - min || 1;
        const pts = values.map((v, i) => {
          const x = pad + (i / (values.length - 1)) * (w - pad * 2);
          const y = pad + ((max - v) / range) * (h - pad * 2);
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        });
        const cls = isGood ? "spark-good" : "spark-bad";
        const last = pts[pts.length - 1];
        return `<svg class="spark-svg" viewBox="0 0 ${w} ${h}"><polyline class="spark-line ${cls}" points="${pts.join(" ")}"/><circle class="${cls} spark-dot" cx="${last.split(",")[0]}" cy="${last.split(",")[1]}" r="2" fill="${isGood ? "var(--accent)" : "var(--danger)"}"/></svg>`;
      }

      // === LOWER GRID ===
      function renderLower() {
        const spread = D.fred.find((f) => f.id === "T10Y2Y");
        const ff = D.fred.find((f) => f.id === "DFF");
        const ue = D.bls.find((b) => b.id === "LNS14000000");
        const cpi = D.bls.find((b) => b.id === "CUUR0000SA0");
        const payrolls = D.bls.find((b) => b.id === "CES0000000001");
        const gscpi = D.gscpi;
        const mkt = D.markets || {};

        const wtiH = D.energy.wtiRecent || [];
        const wtiMax = Math.max(...wtiH),
          wtiMin = Math.min(...wtiH);
        const sparkHtml = wtiH
          .map((v) => {
            const pct =
              wtiMax === wtiMin ? 50 : ((v - wtiMin) / (wtiMax - wtiMin)) * 100;
            return `<div class="spark-bar" style="height:${Math.max(pct, 8)}%"></div>`;
          })
          .join("");

        // Helper: format market quote card
        const mktCard = (q) => {
          if (!q || q.error) return "";
          const clr = q.changePct >= 0 ? "var(--accent)" : "var(--warn)";
          const arrow = q.changePct >= 0 ? "&#9650;" : "&#9660;";
          return `<div class="mc"><div class="ml">${q.name || q.symbol}</div><span class="mv" style="color:${clr}">${q.symbol.includes("BTC") || q.symbol.includes("ETH") ? "$" + q.price.toLocaleString() : "$" + q.price}</span><span class="ms" style="color:${clr}">${arrow} ${q.changePct >= 0 ? "+" : ""}${q.changePct}%</span></div>`;
        };

        // VIX from Yahoo Finance live data (fallback to FRED)
        const vixLive = mkt.vix;
        const vixFred = D.fred.find((f) => f.id === "VIXCLS");
        const vixVal = vixLive?.value || vixFred?.value;
        const vixChg =
          vixLive?.changePct != null
            ? `${vixLive.changePct >= 0 ? "+" : ""}${vixLive.changePct}%`
            : "";

        const metrics = [
          { l: "WTI Crude", v: `$${D.energy.wti}`, s: "$/bbl", p: 70 },
          { l: "Brent", v: `$${D.energy.brent}`, s: "$/bbl", p: 75 },
          {
            l: "Nat Gas",
            v: `$${D.energy.natgas || "--"}`,
            s: "$/MMBtu",
            p: 30,
          },
          {
            l: "VIX",
            v: vixVal ? vixVal.toFixed(1) : "--",
            s: vixChg || "volatility index",
            p: vixVal ? Math.min(vixVal * 2.5, 100) : 30,
          },
          {
            l: "Fed Funds",
            v: ff ? `${ff.value}%` : "--",
            s: ff?.date || "",
            p: 36,
          },
          {
            l: "GSCPI",
            v: gscpi ? gscpi.value.toFixed(2) : "--",
            s: gscpi?.interpretation || "",
            p: 49,
          },
          {
            l: "CPI MoM",
            v: cpi ? `+${cpi.momChangePct?.toFixed(2)}%` : "--",
            s: cpi?.date || "",
            p: 37,
          },
          {
            l: "Unemployment",
            v: ue ? `${ue.value}%` : "--",
            s: ue
              ? `${ue.momChange > 0 ? "+" : ""}${ue.momChange} vs prior`
              : "",
            p: 44,
          },
        ];

        // Attach sparklines from FRED recent data
        const fredSpark = (id, up) => {
          const f = D.fred.find((f) => f.id === id);
          return f?.recent?.length > 1 ? { spark: f.recent, sparkUp: up } : {};
        };
        metrics[0] = {
          ...metrics[0],
          spark: D.energy.wtiRecent,
          sparkUp: false,
        };

        // Build live market cards from Yahoo Finance
        const allIndexes = mkt.all?.indexes || mkt.indexes || [];
        const allCommodities = mkt.all?.commodities || mkt.commodities || [];
        const indexesToShow = (mkt.indexes || []);
        const commoditiesToShow = (mkt.commodities || []);

        // Generate index cards with expand/collapse
        const indexCards = indexesToShow.map(mktCard).join("");
        const indexCardsHidden = allIndexes.slice(indexesToShow.length).map(mktCard).join("");
        const indexExpandHtml = allIndexes.length > indexesToShow.length
          ? `<button class="market-expand-btn" onclick="toggleMarketExpand('indexes', event)">
             +${allIndexes.length - indexesToShow.length} more
           </button>
           <div class="market-expand-hidden" id="indexes-hidden">${indexCardsHidden}</div>`
          : "";

        // Generate commodity cards with expand/collapse
        const commodityCards = commoditiesToShow.map(mktCard).join("");
        const commodityCardsHidden = allCommodities.slice(commoditiesToShow.length).map(mktCard).join("");
        const commodityExpandHtml = allCommodities.length > commoditiesToShow.length
          ? `<button class="market-expand-btn" onclick="toggleMarketExpand('commodities', event)">
             +${allCommodities.length - commoditiesToShow.length} more
           </button>
           <div class="market-expand-hidden" id="commodities-hidden">${commodityCardsHidden}</div>`
          : "";

        const cryptoCards = (mkt.crypto || []).map(mktCard).join("");
        const rateCards = (mkt.rates || []).map(mktCard).join("");
        const hasMarkets = indexCards || cryptoCards || commodityCards;

        const srcHtml = D.health
          .map(
            (s) =>
              `<div class="src-item"><div class="sd ${s.err ? "err" : "ok"}"></div><span>${s.n}</span></div>`,
          )
          .join("");

        // NEWS TICKER — merges RSS + GDELT + Telegram into flowing cards (moved from right rail)
        const feed = (D.newsFeed || []).slice(0, 80);
        const srcClass = (s) => {
          if (!s) return "other";
          const sl = s.toLowerCase();
          if (sl.includes("bbc")) return "bbc";
          if (sl.includes("nyt") || sl.includes("times")) return "nyt";
          if (sl.includes("jazeera") || sl.includes("alj")) return "alj";
          if (sl.includes("gdelt")) return "gdelt";
          if (sl.includes("telegram")) return "tg";
          if (sl.includes("华尔街") || sl.includes("wallstreet") || sl.includes("wscn")) return "wscn";
          if (sl.includes("东方财富") || sl.includes("eastmoney")) return "em";
          return "other";
        };
        const tickerCards = feed
          .map((n) => {
            const sc = srcClass(n.source);
            const age = n.timestamp ? getAge(n.timestamp) : "";
            const urlAttr = n.url
              ? ` data-url="${String(n.url).replace(/&/g, "&amp;").replace(/"/g, "&quot;")}"`
              : "";
            return `<div class="tk-card ${n.urgent ? "urgent" : ""} ${n.url ? "clickable" : ""}"${urlAttr}><span class="tk-src ${sc}">${(n.source || "NEWS").substring(0, 12)}</span><span class="tk-time">${age}</span><div class="tk-head">${cleanText(n.headline || "")}</div>${n.url ? '<span class="tk-link">&#8599;</span>' : ""}</div>`;
          })
          .join("");
        const tickerDuration = Math.max(20, feed.length * 2.5);

        // Leverageable Ideas (LLM-only feature)
        const hasIdeas = D.ideas && D.ideas.length > 0;
        const ideasHtml = hasIdeas
          ? (D.ideas || [])
              .map(
                (idea) => `
    <div class="idea-card">
      <span class="idea-type ${(idea.type || "").toLowerCase()}">${(idea.type || "").toUpperCase()}</span>
      ${idea.ticker ? `<span class="idea-horizon">${idea.ticker}</span>` : ""}
      ${idea.horizon ? `<span class="idea-horizon">${idea.horizon}</span>` : ""}
      <span class="idea-conf">${idea.confidence} confidence</span>
      <div class="idea-title">${idea.title}</div>
      <div class="idea-text">${idea.text || idea.rationale || ""}</div>
      ${idea.risk ? `<div class="idea-text" style="color:var(--warn);margin-top:3px">Risk: ${idea.risk}</div>` : ""}
    </div>`,
              )
              .join("")
          : `<div style="padding:20px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:11px">
      <div style="font-size:24px;margin-bottom:8px;opacity:0.3">&#9888;</div>
      <div>LLM NOT CONFIGURED</div>
      <div style="font-size:9px;margin-top:6px;opacity:0.6">Set LLM_PROVIDER + credentials in .env to enable AI-powered trade ideas</div>
    </div>`;

        // DELTA PANEL — what changed since last sweep
        const delta = D.delta || {};
        const ds = delta.summary || {};
        const hasDelta = ds.totalChanges > 0;
        const dirEmoji =
          { "risk-off": "&#9650;", "risk-on": "&#9660;", mixed: "&#9670;" }[
            ds.direction
          ] || "&#9670;";
        const dirClass =
          { "risk-off": "up", "risk-on": "down", mixed: "" }[ds.direction] ||
          "";
        // Dynamic allocation: prioritize new signals, fill remainder with escalated/deescalated
        const allNew = (delta.signals?.new || []);
        const allEscalated = (delta.signals?.escalated || []);
        const allDeescalated = (delta.signals?.deescalated || []);

        // Sort new signals by date (most recent first)
        allNew.sort((a, b) => {
          const dateA = a.date ? new Date(a.date).getTime() : 0;
          const dateB = b.date ? new Date(b.date).getTime() : 0;
          return dateB - dateA; // Descending: newest first
        });

        // Show up to 8 new signals (they're most important), then fill with others to reach ~12 total
        const newSigs = allNew.slice(0, 8);
        const remainingSlots = Math.max(0, 12 - newSigs.length);
        const escalated = allEscalated.slice(0, Math.ceil(remainingSlots * 0.6));
        const deescalated = allDeescalated.slice(0, Math.floor(remainingSlots * 0.4));

        const deltaRows = [];
        // Format relative time for posts
        const formatTime = (dateStr) => {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          const now = new Date();
          const diffMins = Math.floor((now - d) / 60000);
          if (diffMins < 1) return 'just now';
          if (diffMins < 60) return `${diffMins}m ago`;
          const diffHours = Math.floor(diffMins / 60);
          if (diffHours < 24) return `${diffHours}h ago`;
          return `${Math.floor(diffHours / 24)}d ago`;
        };
        for (const s of newSigs) {
          // For urgent OSINT posts, show the actual post content with time and channel
          if (s.reason === 'New urgent OSINT post' && s.text) {
            const timeStr = formatTime(s.date);
            const channelStr = s.channel ? `<span style="color:#ffb74d;font-size:10px;margin-left:4px">@${s.channel}</span>` : '';
            deltaRows.push(
              `<div class="delta-row new" style="flex-direction:column;align-items:flex-start;gap:2px;padding:8px 0">
                <div style="display:flex;align-items:center;gap:4px;width:100%">
                  <span class="delta-badge new">NEW</span>
                  <span style="color:#4dd0e1;font-size:11px;letter-spacing:0.05em">URGENT OSINT</span>
                  ${timeStr ? `<span style="color:var(--dim);font-size:10px;margin-left:auto">${timeStr}</span>` : ''}
                </div>
                <div style="color:var(--text);font-size:12px;line-height:1.4;margin-left:20px;max-width:100%;overflow:hidden;text-overflow:ellipsis">${s.text}</div>
                ${channelStr}
              </div>`
            );
          } else {
            // Other new signals
            deltaRows.push(
              `<div class="delta-row new"><span class="delta-badge new">NEW</span><span class="delta-label">${s.reason || s.label || s.key}</span></div>`,
            );
          }
        }
        for (const s of escalated) {
          const sev =
            s.severity === "critical"
              ? 'style="color:var(--warn);font-weight:600"'
              : s.severity === "high"
                ? 'style="color:#ffab40"'
                : "";
          const val =
            s.pctChange !== undefined
              ? `${s.pctChange > 0 ? "+" : ""}${s.pctChange}%`
              : `${s.change > 0 ? "+" : ""}${s.change}`;
          deltaRows.push(
            `<div class="delta-row"><span class="delta-badge up">&#9650;</span><span class="delta-label" ${sev}>${s.label}</span><span class="delta-val">${s.from}→${s.to} (${val})</span></div>`,
          );
        }
        for (const s of deescalated) {
          const val =
            s.pctChange !== undefined ? `${s.pctChange}%` : `${s.change}`;
          deltaRows.push(
            `<div class="delta-row"><span class="delta-badge down">&#9660;</span><span class="delta-label">${s.label || s.key}</span><span class="delta-val">${s.from}→${s.to} (${val})</span></div>`,
          );
        }
        const deltaHtml = hasDelta
          ? deltaRows.join("")
          : '<div style="padding:12px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:10px">No changes since last sweep</div>';

        document.getElementById("lowerGrid").innerHTML = `
    <div class="g-panel lp-ticker" style="display:flex;flex-direction:column">
      <div class="sec-head"><h3>Live News Ticker</h3><span class="badge">${feed.length} ITEMS</span></div>
      <div class="ticker-wrap" style="--ticker-duration:${tickerDuration}s">
        <div class="ticker-track">${tickerCards}${tickerCards}</div>
      </div>
    </div>
    <div class="g-panel lp-delta">
      <div class="sec-head"><h3>Sweep Delta</h3><span class="badge ${dirClass}">${dirEmoji} ${ds.direction ? ds.direction.toUpperCase() : "BASELINE"}</span></div>
      ${
        hasDelta
          ? `<div style="display:flex;gap:12px;margin-bottom:6px;font-family:var(--mono);font-size:10px">
        <span style="color:var(--dim)">Changes: <span style="color:var(--accent)">${ds.totalChanges}</span></span>
        <span style="color:var(--dim)">Critical: <span style="color:${ds.criticalChanges > 0 ? "var(--warn)" : "var(--dim)"}">${ds.criticalChanges || 0}</span></span>
        ${ds.signalBreakdown ? `<span style="color:var(--dim)">New: <span style="color:#4dd0e1">${ds.signalBreakdown.new}</span> &#8593;${ds.signalBreakdown.escalated} &#8595;${ds.signalBreakdown.deescalated}</span>` : ""}
      </div>`
          : ""
      }
      <div class="delta-list">${deltaHtml}</div>
    </div>
    <div class="g-panel lp-macro">
      <div class="sec-head"><h3>Macro + Markets</h3><span class="badge">${mkt.timestamp ? "LIVE" : "DELAYED"}</span></div>
      ${
        hasMarkets
          ? `<div style="margin-bottom:8px">
        <div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px;letter-spacing:1px">INDEXES${indexExpandHtml}</div>
        <div class="metrics-row">${indexCards}</div>
        <div class="metrics-row" id="indexes-hidden-row" style="display:none"></div>
      </div>
      <div style="margin-bottom:8px">
        <div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px;letter-spacing:1px">CRYPTO</div>
        <div class="metrics-row">${cryptoCards}</div>
      </div>
      <div style="margin-bottom:8px">
        <div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px;letter-spacing:1px">COMMODITIES${commodityExpandHtml}</div>
        <div class="metrics-row">${commodityCards}</div>
        <div class="metrics-row" id="commodities-hidden-row" style="display:none"></div>
      </div>`
          : ""
      }
      <div style="margin-bottom:8px">
        <div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px;letter-spacing:1px">ENERGY + MACRO</div>
        <div class="metrics-row">${metrics
          .map((m) => {
            const sparkSvg = m.spark ? mkSparkSvg(m.spark, m.sparkUp) : "";
            return `<div class="mc"><div class="ml">${m.l}</div><span class="mv">${m.v}${sparkSvg}</span><span class="ms">${m.s}</span><div class="mbar"><span style="width:${m.p}%"></span></div></div>`;
          })
          .join("")}</div>
      </div>
      <div style="margin-top:6px">
        <div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px">WTI 5-DAY</div>
        <div class="spark">${sparkHtml}</div>
      </div>
    </div>
    <div class="g-panel" style="display:flex;flex-direction:column;min-height:750px">
      <div class="sec-head"><h3>Hot Map</h3></div>
      <iframe src="https://v.want.biz/" style="flex:1;border:none;background:#1a1a2e;border-radius:6px;filter:invert(0.92) hue-rotate(180deg);" allowfullscreen></iframe>
    </div>
    <div class="g-panel lp-ideas">
      <div class="sec-head"><h3>Leverageable Ideas</h3>${D.ideasSource === "llm" ? '<span class="ideas-src llm">AI ENHANCED</span>' : D.ideasSource === "disabled" ? '<span class="ideas-src static">LLM OFF</span>' : '<span class="ideas-src static">PENDING</span>'}</div>
      ${ideasHtml}
      <div class="disclosure">FOR INFORMATIONAL PURPOSES ONLY. This is not financial advice, a recommendation to buy or sell any security, or a solicitation of any kind. All signal-based observations are derived from publicly available OSINT data and should not be relied upon for investment decisions. Consult a licensed financial advisor before making any investment. Past performance does not guarantee future results.</div>
    </div>`;
      }

      // === RIGHT RAIL ===
      function renderRight() {
        // CROSS-SOURCE SIGNALS — moved from lower grid to right rail
        const signals = D.tSignals
          .slice(0, 6)
          .map(
            (s, i) =>
              `<div class="signal-row"><strong>Signal ${i + 1}</strong><p>${s}</p></div>`,
          )
          .join("");

        // OSINT TICKER — Telegram + WHO as flowing cards
        const allPosts = [...D.tg.urgent, ...D.tg.topPosts].sort(
          (a, b) => new Date(b.date || 0) - new Date(a.date || 0),
        );
        const whoItems = D.who
          .slice(0, 4)
          .map((w) => ({
            channel: "WHO ALERT",
            text: w.title,
            date: w.date,
            isWho: true,
          }));
        const osintItems = [...allPosts.slice(0, 15), ...whoItems];
        const osintCards = osintItems
          .map((p) => {
            const isU = p.urgentFlags && p.urgentFlags.length > 0;
            const views = p.views
              ? p.views >= 1000
                ? `${(p.views / 1000).toFixed(0)}K`
                : p.views
              : "";
            const age = p.date ? getAge(p.date) : "";
            const flags = (p.urgentFlags || [])
              .map(
                (f) =>
                  `<span class="tk-src tg" style="margin-right:2px">${f}</span>`,
              )
              .join("");
            const srcCls = p.isWho
              ? 'style="color:#69f0ae;border-color:rgba(105,240,174,0.4)"'
              : 'class="tk-src tg"';
            return `<div class="tk-card ${isU ? "urgent" : ""}"><span ${srcCls}>${(p.channel || "OSINT").toUpperCase().substring(0, 14)}</span>${views ? `<span class="tk-src other">${views}</span>` : ""}<span class="tk-time">${age}</span>${flags}<div class="tk-head">${cleanText((p.text || "").substring(0, 160))}</div></div>`;
          })
          .join("");
        const osintDuration = Math.max(25, osintItems.length * 3);

        const signalMetrics = [
          { l: "Incident Tempo", v: D.tg.urgent.length, p: 70 },
          { l: "Air Theaters", v: D.air.length, p: 60 },
          {
            l: "Thermal Spikes",
            v: D.thermal.reduce((s, t) => s + t.hc, 0),
            p: 80,
          },
          { l: "SDR Nodes", v: D.sdr.total, p: 92 },
          { l: "Chokepoints", v: D.chokepoints.length, p: 50 },
          { l: "WHO Alerts", v: D.who.length, p: 40 },
        ];

        document.getElementById("rightRail").innerHTML = `
    <div class="g-panel">
      <div class="sec-head"><h3>Cross-Source Signals</h3><span class="badge">WORLDVIEW</span></div>
      ${signals}
    </div>
    <div class="g-panel" style="display:flex;flex-direction:column">
      <div class="sec-head"><h3>OSINT Stream</h3><span class="badge">${D.tg.urgent.length} URGENT</span></div>
      <div class="ticker-wrap" style="--ticker-duration:${osintDuration}s;max-height:520px">
        <div class="ticker-track">${osintCards}${osintCards}</div>
      </div>
    </div>
    <div class="g-panel">
      <div class="sec-head"><h3>Signal Core</h3><span class="badge">HOT METRICS</span></div>
      ${signalMetrics.map((s) => `<div class="sm"><span class="sml">${s.l}</span><div class="smb"><span style="width:${s.p}%"></span></div><span class="smv">${s.v}</span></div>`).join("")}
    </div>
    <div class="g-panel" style="display:flex;flex-direction:column;min-height:800px">
      <div class="sec-head"><h3>Wealth Future</h3></div>
      <iframe src="https://wealth.want.biz/pages/future.html?dark=1" style="flex:1;border:none;background:var(--panel);border-radius:6px;" allowfullscreen></iframe>
    </div>`;
      }

      // === HELPERS ===
      function getAge(d) {
        const ms = Date.now() - new Date(d).getTime();
        const h = Math.floor(ms / 3600000);
        if (h < 1) return "just now";
        if (h < 24) return h + "h ago";
        return Math.floor(h / 24) + "d ago";
      }
      function cleanText(t) {
        return t
          .replace(/&#39;/g, "'")
          .replace(/&#33;/g, "!")
          .replace(/&amp;/g, "&")
          .replace(/<[^>]+>/g, "");
      }
      function safeExternalUrl(raw) {
        try {
          const u = new URL(raw, location.href);
          return u.protocol === "http:" || u.protocol === "https:"
            ? u.toString()
            : null;
        } catch {
          return null;
        }
      }

      // === BOOT SEQUENCE ===
      function runBoot() {
        const acledStatus =
          D.acled?.totalEvents > 0
            ? `<span class="ok">${D.acled.totalEvents} EVENTS</span>`
            : '<span style="color:var(--warn)">DEGRADED</span>';
        const lines = [
          { text: "INITIALIZING CRUCIX ENGINE v2.1.0", delay: 0 },
          {
            text: `CONNECTING ${D.meta.sourcesQueried} OSINT SOURCES...`,
            delay: 400,
          },
          {
            text: "&#9500;&#9472; OPENSKY &#183; FIRMS &#183; KIWISDR &#183; MARITIME",
            delay: 700,
          },
          {
            text: "&#9500;&#9472; FRED &#183; BLS &#183; EIA &#183; TREASURY &#183; GSCPI",
            delay: 900,
          },
          {
            text: "&#9500;&#9472; TELEGRAM &#183; SAFECAST &#183; EPA &#183; WHO &#183; OFAC",
            delay: 1100,
          },
          {
            text: "&#9492;&#9472; GDELT &#183; NOAA &#183; PATENTS &#183; BLUESKY &#183; REDDIT",
            delay: 1300,
          },
          {
            text: `SWEEP COMPLETE &#8212; <span class="count">${D.meta.sourcesOk}/${D.meta.sourcesQueried}</span> SOURCES <span class="ok">OK</span>`,
            delay: 1700,
          },
          { text: `ACLED CONFLICT LAYER: ${acledStatus}`, delay: 1900 },
          {
            text: 'FLIGHT CORRIDORS: <span class="ok">ACTIVE</span> &#183; DUAL PROJECTION: <span class="ok">READY</span>',
            delay: 2100,
          },
          {
            text: 'INTELLIGENCE SYNTHESIS: <span class="ok">ACTIVE</span>',
            delay: 2400,
          },
        ];
        const container = document.getElementById("bootLines");
        const tl = gsap.timeline();
        tl.to(
          ".logo-ring",
          { opacity: 1, duration: 0.6, ease: "power2.out" },
          0,
        );
        tl.to(container, { opacity: 1, duration: 0.3 }, 0.3);
        lines.forEach((line) => {
          tl.call(
            () => {
              const div = document.createElement("div");
              div.innerHTML = line.text;
              div.style.opacity = "0";
              container.appendChild(div);
              gsap.to(div, { opacity: 1, duration: 0.2 });
            },
            null,
            line.delay / 1000 + 0.5,
          );
        });
        tl.to("#bootFinal", { opacity: 1, duration: 0.4 }, 3.1);
        tl.to("#boot", { opacity: 0, duration: 0.5, ease: "power2.in" }, 3.7);
        tl.set("#boot", { display: "none" }, 4.2);
        tl.to("#bgRadial", { opacity: 1, duration: 1 }, 3.8);
        tl.to("#bgGrid", { opacity: 1, duration: 1.2 }, 4.0);
        tl.to("#scanline", { opacity: 1, duration: 0.8 }, 4.3);
        tl.to("#main", { opacity: 1, duration: 0.6 }, 3.9);
        tl.call(() => {
          gsap.from(".g-panel,.topbar,.map-container", {
            opacity: 0,
            y: 20,
            scale: 0.97,
            duration: 0.5,
            stagger: 0.06,
            ease: "power2.out",
          });
          setTimeout(
            () =>
              gsap.from(".layer-item,.site-row,.econ-row", {
                opacity: 0,
                x: -12,
                duration: 0.25,
                stagger: 0.03,
                ease: "power1.out",
              }),
            500,
          );
          setTimeout(
            () =>
              gsap.from(".ic", {
                opacity: 0,
                y: 12,
                duration: 0.25,
                stagger: 0.03,
                ease: "power1.out",
              }),
            600,
          );
          setTimeout(
            () =>
              gsap.from(".mc", {
                opacity: 0,
                y: 8,
                duration: 0.25,
                stagger: 0.04,
                ease: "power1.out",
              }),
            800,
          );
          setTimeout(
            () =>
              gsap.from(".idea-card", {
                opacity: 0,
                x: 12,
                duration: 0.3,
                stagger: 0.06,
                ease: "power1.out",
              }),
            900,
          );
          setTimeout(() => {
            document.querySelectorAll(".mbar span,.smb span").forEach((bar) => {
              const w = bar.style.width;
              bar.style.width = "0%";
              gsap.to(bar, { width: w, duration: 1, ease: "power2.out" });
            });
            document.querySelectorAll(".spark-bar").forEach((bar) => {
              const h = bar.style.height;
              bar.style.height = "0%";
              gsap.to(bar, { height: h, duration: 0.8, ease: "power2.out" });
            });
          }, 1000);
        }, 4.0);
      }

      // === REINIT (for live updates without boot sequence) ===
      function reinit() {
        renderTopbar();
        renderLeftRail();
        renderLower();
        renderRight();
        plotMarkers();
      }

      // === SSE: Live Updates from Server ===
      function connectSSE() {
        if (typeof EventSource === "undefined") return;
        // Only connect if served from localhost (not file://)
        if (location.protocol === "file:") return;

        const es = new EventSource("/events");
        es.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === "update" && msg.data) {
              D = msg.data;
              reinit();
              // Flash the topbar to indicate update
              const topbar = document.querySelector(".topbar");
              if (topbar) {
                topbar.style.borderColor = "var(--accent)";
                setTimeout(() => (topbar.style.borderColor = ""), 1500);
              }
            } else if (msg.type === "sweep_start") {
              const badge = document.querySelector(".alert-badge");
              if (badge) {
                badge.textContent = "SWEEPING...";
                badge.style.borderColor = "var(--accent)";
              }
            }
          } catch {}
        };
        es.onerror = () => {
          // Reconnect after 5s on error
          es.close();
          setTimeout(connectSSE, 5000);
        };
      }

      // === INIT ===
      let booted = false;
      function init() {
        renderTopbar();
        renderLeftRail();
        renderLower();
        renderRight();
        initMap();
        if (!booted) {
          runBoot();
          booted = true;
        }
        // Close popup on click outside markers
        document
          .getElementById("mapContainer")
          .addEventListener("click", (e) => {
            if (!e.target.closest(".map-popup")) closePopup();
          });
        // Open article links from ticker cards
        document.addEventListener("click", (e) => {
          const card = e.target.closest(".tk-card[data-url]");
          if (card) {
            const url = safeExternalUrl(card.dataset.url);
            if (url) window.open(url, "_blank", "noopener");
          }
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        const isServer = location.protocol !== "file:";

        if (isServer) {
          // Server mode: always fetch live data from API (ignore any stale inline D)
          fetch("/api/data")
            .then((r) => r.json())
            .then((data) => {
              D = data;
              init();
              connectSSE();
            })
            .catch(() => {
              // Should not reach here — server routes to loading.html when no data
              if (D && D.meta) {
                init();
                connectSSE();
              }
            });
        } else if (D && D.meta) {
          // File mode: use inline data
          init();
        }
      });
    </script>
  </body>
</html>
