        if (sec < 60) return sec + "秒前";
        if (min < 60) return min + "分钟前";
        if (h < 24) return h + "小时前";
        return day + "天前";
      }
      function cleanText(t) {
        return t
          .replace(/&#39;/g, "'")
          .replace(/&#33;/g, "!")
          .replace(/&amp;/g, "&")
          .replace(/<[^>]+>/g, "");
      }
      function safeExternalUrl(raw) {
        try {
          const u = new URL(raw, location.href);
          return u.protocol === "http:" || u.protocol === "https:"
            ? u.toString()
            : null;
        } catch {
          return null;
        }
      }

      // === BOOT SEQUENCE ===
      function runBoot() {
        const acledStatus =
          D.acled?.totalEvents > 0
            ? `<span class="ok">${D.acled.totalEvents} EVENTS</span>`
            : '<span style="color:var(--warn)">DEGRADED</span>';
        const lines = [
          { text: "INITIALIZING CRUCIX ENGINE v2.1.0", delay: 0 },
          {
            text: `CONNECTING ${D.meta.sourcesQueried} OSINT SOURCES...`,
            delay: 400,
          },
          {
            text: "&#9500;&#9472; OPENSKY &#183; FIRMS &#183; KIWISDR &#183; MARITIME",
            delay: 700,
          },
          {
            text: "&#9500;&#9472; FRED &#183; BLS &#183; EIA &#183; TREASURY &#183; GSCPI",
            delay: 900,
          },
          {
            text: "&#9500;&#9472; TELEGRAM &#183; SAFECAST &#183; EPA &#183; WHO &#183; OFAC",
            delay: 1100,
          },
          {
            text: "&#9492;&#9472; GDELT &#183; NOAA &#183; PATENTS &#183; BLUESKY &#183; REDDIT",
            delay: 1300,
          },
          {
            text: `SWEEP COMPLETE &#8212; <span class="count">${D.meta.sourcesOk}/${D.meta.sourcesQueried}</span> SOURCES <span class="ok">OK</span>`,
            delay: 1700,
          },
          { text: `ACLED CONFLICT LAYER: ${acledStatus}`, delay: 1900 },
          {
            text: 'FLIGHT CORRIDORS: <span class="ok">ACTIVE</span> &#183; DUAL PROJECTION: <span class="ok">READY</span>',
            delay: 2100,
          },
          {
            text: 'INTELLIGENCE SYNTHESIS: <span class="ok">ACTIVE</span>',
            delay: 2400,
          },
        ];
        const container = document.getElementById("bootLines");
        const tl = gsap.timeline();
        tl.to(
          ".logo-ring",
          { opacity: 1, duration: 0.6, ease: "power2.out" },
          0,
        );
        tl.to(container, { opacity: 1, duration: 0.3 }, 0.3);
        lines.forEach((line) => {
          tl.call(
            () => {
              const div = document.createElement("div");
              div.innerHTML = line.text;
              div.style.opacity = "0";
              container.appendChild(div);
              gsap.to(div, { opacity: 1, duration: 0.2 });
            },
            null,
            line.delay / 1000 + 0.5,
          );
        });
        tl.to("#bootFinal", { opacity: 1, duration: 0.4 }, 3.1);
        tl.to("#boot", { opacity: 0, duration: 0.5, ease: "power2.in" }, 3.7);
        tl.set("#boot", { display: "none" }, 4.2);
        tl.to("#bgRadial", { opacity: 1, duration: 1 }, 3.8);
        tl.to("#bgGrid", { opacity: 1, duration: 1.2 }, 4.0);
        tl.to("#scanline", { opacity: 1, duration: 0.8 }, 4.3);
        tl.to("#main", { opacity: 1, duration: 0.6 }, 3.9);
        tl.call(() => {
          gsap.from(".g-panel,.topbar,.map-container", {
            opacity: 0,
            y: 20,
            scale: 0.97,
            duration: 0.5,
            stagger: 0.06,
            ease: "power2.out",
          });
          setTimeout(
            () =>
              gsap.from(".layer-item,.site-row,.econ-row", {
                opacity: 0,
                x: -12,
                duration: 0.25,
                stagger: 0.03,
                ease: "power1.out",
              }),
            500,
          );
          setTimeout(
            () =>
              gsap.from(".ic", {
                opacity: 0,
                y: 12,
                duration: 0.25,
                stagger: 0.03,
                ease: "power1.out",
              }),
            600,
          );
          setTimeout(
            () =>
              gsap.from(".mc", {
                opacity: 0,
                y: 8,
                duration: 0.25,
                stagger: 0.04,
                ease: "power1.out",
              }),
            800,
          );
          setTimeout(
            () =>
              gsap.from(".idea-card", {
                opacity: 0,
                x: 12,
                duration: 0.3,
                stagger: 0.06,
                ease: "power1.out",
              }),
            900,
          );
          setTimeout(() => {
            document.querySelectorAll(".mbar span,.smb span").forEach((bar) => {
              const w = bar.style.width;
              bar.style.width = "0%";
              gsap.to(bar, { width: w, duration: 1, ease: "power2.out" });
            });
            document.querySelectorAll(".spark-bar").forEach((bar) => {
              const h = bar.style.height;
              bar.style.height = "0%";
              gsap.to(bar, { height: h, duration: 0.8, ease: "power2.out" });
            });
          }, 1000);
        }, 4.0);
      }

      // === REINIT (for live updates without boot sequence) ===
      function reinit() {
        renderTopbar();
        renderLeftRail();
        renderLower();
        renderRight();
        plotMarkers();
      }

      // === SSE: Live Updates from Server ===
      function connectSSE() {
        if (typeof EventSource === "undefined") return;
        // Only connect if served from localhost (not file://)
        if (location.protocol === "file:") return;

        const es = new EventSource("/events");
        es.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === "update" && msg.data) {
              D = msg.data;
              reinit();
              // Flash the topbar to indicate update
              const topbar = document.querySelector(".topbar");
              if (topbar) {
                topbar.style.borderColor = "var(--accent)";
                setTimeout(() => (topbar.style.borderColor = ""), 1500);
              }
            } else if (msg.type === "sweep_start") {
              const badge = document.querySelector(".alert-badge");
              if (badge) {
                badge.textContent = "SWEEPING...";
                badge.style.borderColor = "var(--accent)";
              }
            }
          } catch {}
        };
        es.onerror = () => {
          // Reconnect after 5s on error
          es.close();
          setTimeout(connectSSE, 5000);
        };
      }

      // === INIT ===
      let booted = false;
      function init() {
        renderTopbar();
        renderLeftRail();
        renderLower();
        renderRight();
        try { initMap(); } catch(e) {
          console.warn("[Crucix] Globe/WebGL unavailable:", e.message);
          // Show flat map fallback placeholder if globe fails to init
          const globeViz = document.getElementById("globeViz");
          if (globeViz) {
            globeViz.style.display = "none";
          }
          const flatMap = document.getElementById("flatMapSvg");
          if (flatMap) {
            flatMap.style.display = "block";
            try { initFlatMap(); } catch(e2) {}
          }
        }
        if (!booted) {
          runBoot();
          booted = true;
        }
        // Close popup on click outside markers
        document
          .getElementById("mapContainer")
          .addEventListener("click", (e) => {
            if (!e.target.closest(".map-popup")) closePopup();
          });
        // Open article links from ticker cards
        document.addEventListener("click", (e) => {
          const card = e.target.closest(".tk-card[data-url]");
          if (card) {
            const url = safeExternalUrl(card.dataset.url);
            if (url) window.open(url, "_blank", "noopener");
          }
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        const isServer = location.protocol !== "file:";

        if (isServer) {
          // Server mode: always fetch live data from API (ignore any stale inline D)
          fetch("/api/data")
            .then((r) => r.json())
            .then((data) => {
              D = data;
              init();
              connectSSE();
            })
            .catch(() => {
              // Should not reach here — server routes to loading.html when no data
              if (D && D.meta) {
                init();
                connectSSE();
              }
            });
        } else if (D && D.meta) {
          // File mode: use inline data
          init();
        }
      });
    </script>
  </body>
</html>
